endpoint: relevance
limit: 5
timeout: 30.0
fields: paperId,title,year,authors,url,abstract,citationCount,influentialCitationCount,venue,externalIds,isOpenAccess,openAccessPdf
filters:
  sort:
  publication_types: []
  open_access_pdf:
  min_citation_count:
  publication_date_or_year:
  year:
  venue:
  fields_of_study: []
mode: single_thread
single_thread:
  workers: 1
  max_retries: 5
  retry_delay: 1.0
  pause_seconds: 1.0
multi_thread:
  workers: 8
  max_retries: 5
  retry_delay: 1.0
  pause_seconds: 0.0
